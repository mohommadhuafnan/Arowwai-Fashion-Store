# Deploy backend API on Render (free tier) — required for MongoDB, auth, AI, POS API
# Dashboard: https://dashboard.render.com → New → Blueprint → connect GitHub repo

services:
  - type: web
    name: arowwai-fashion-api
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_URI_SRV
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: FRONTEND_URL
        value: https://arowwai-fashion-store.vercel.app
      - key: FIREBASE_PROJECT_ID
        value: fashion-mate-mawanella
      - key: GITHUB_AI_MODEL
        value: deepseek/DeepSeek-V3-0324
      - key: GITHUB_TOKEN
        sync: false
